# board_default.conf
# 默认板卡配置
export BOARD_NAME=board_default

# 配置文件路径
export KERNEL_DEFCONFIG="$PROJECT_ROOT/board/board_default/config/kernel_defconfig"
export UBOOT_DEFCONFIG="$PROJECT_ROOT/board/board_default/config/uboot_defconfig"
export BUILDROOT_DEFCONFIG="buildroot_defconfig"

# 板卡特定参数
export KERNEL_ARCH=arm64
export UBOOT_ARCH=arm64
export QEMU_MACHINE=virt
export QEMU_CPU=cortex-a57
export QEMU_SMP=4
export QEMU_MEM=1024
export KERNEL_CMDLINE="console=ttyAMA0 root=/dev/vda rw nokaslr earlycon=pl011,0x9000000 debug loglevel=8"

# 输出目录
export BOARD_OUT_DIR="$OUT_DIR/board_default"
# BR2_EXTERNAL 目录
export BR2_EXTERNAL_DIR="$PROJECT_ROOT/board/board_default/br2_external"
