# board_qemu_b.conf
# 针对 QEMU 平台 board_qemu_b 定义变量
export BOARD_NAME=board_qemu_b

# ARM 交叉编译工具链目录（针对 macOS Apple Silicon）
export ARM_TOOLCHAIN_DIR="$PROJECT_ROOT/tools/arm-gnu-toolchain-13.3.rel1-darwin-arm64-aarch64-none-elf"

# 编译工具链前缀
export CROSS_COMPILE="aarch64-none-elf-"

# 配置文件路径
export KERNEL_DEFCONFIG="$PROJECT_ROOT/board/board_qemu_b/config/kernel_defconfig"
export UBOOT_DEFCONFIG="$PROJECT_ROOT/board/board_qemu_b/config/uboot_defconfig"
export BUILDROOT_DEFCONFIG="buildroot_defconfig"

# 板卡特定参数
export KERNEL_ARCH=arm64
export UBOOT_ARCH=arm64
export QEMU_MACHINE=virt
export QEMU_CPU=cortex-a57
export QEMU_SMP=2
export QEMU_MEM=2048
export KERNEL_CMDLINE="console=ttyAMA0 root=/dev/vda rw nokaslr preempt loglevel=7"

# 输出目录
export BOARD_OUT_DIR="$OUT_DIR/board_qemu_b"
# BR2_EXTERNAL 目录
export BR2_EXTERNAL_DIR="$PROJECT_ROOT/board/board_qemu_b/br2_external"
