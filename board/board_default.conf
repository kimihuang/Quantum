# board_default.conf
# 默认板卡配置
BOARD_NAME=board_default

# 配置文件路径
KERNEL_DEFCONFIG="$PROJECT_ROOT/board/board_default/config/kernel_defconfig"
UBOOT_DEFCONFIG="$PROJECT_ROOT/board/board_default/config/uboot_defconfig"
BUILDROOT_DEFCONFIG="buildroot_defconfig"

# 板卡特定参数
KERNEL_ARCH=arm64
UBOOT_ARCH=arm64
QEMU_MACHINE=virt
QEMU_CPU=cortex-a57
QEMU_SMP=4
QEMU_MEM=1024
KERNEL_CMDLINE="console=ttyAMA0 root=/dev/vda rw nokaslr earlycon=pl011,0x9000000 debug loglevel=8"

# 输出目录
BOARD_OUT_DIR="$OUT_DIR/board_default"
# BR2_EXTERNAL 目录
BR2_EXTERNAL_DIR="$PROJECT_ROOT/board/board_default/br2_external"
