# board_qemu_a.conf
# 针对 QEMU 平台 board_qemu_a 定义变量
BOARD_NAME=board_qemu_a

# 配置文件路径
KERNEL_DEFCONFIG="$PROJECT_ROOT/board/board_qemu_a/config/kernel_defconfig"
UBOOT_DEFCONFIG="$PROJECT_ROOT/board/board_qemu_a/config/uboot_defconfig"
BUILDROOT_DEFCONFIG="buildroot_defconfig"

# 板卡特定参数
KERNEL_ARCH=arm64
UBOOT_ARCH=arm64
QEMU_MACHINE=virt
QEMU_CPU=cortex-a57
QEMU_SMP=4
QEMU_MEM=1024
KERNEL_CMDLINE="console=ttyAMA0 root=/dev/ram0 rw init=/linuxrc nokaslr earlycon=pl011,0x9000000 debug loglevel=8"
#KERNEL_CMDLINE="console=ttyAMA0 rw init=/linuxrc nokaslr earlycon=pl011,0x9000000 debug loglevel=8"
# 输出目录
BOARD_OUT_DIR="$OUT_DIR/board_qemu_a"
# BR2_EXTERNAL 目录
BR2_EXTERNAL_DIR="$PROJECT_ROOT/board/board_qemu_a/br2_external"
