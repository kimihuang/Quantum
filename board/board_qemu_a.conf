# board_qemu_a.conf
# 针对 QEMU 平台 board_qemu_a 定义变量
export BOARD_NAME=board_qemu_a

export LINUX_LOCAL_VERSION=6.1

# 配置文件路径
export KERNEL_DEFCONFIG="quantum_qemu"
#export KERNEL_DEFCONFIG="defconfig"
export UBOOT_DEFCONFIG="quantum_qemu_arm64_uboot"
export BUILDROOT_DEFCONFIG="buildroot_defconfig"
export KERNEL_DTB_NAME="quantum/quantum_qemu"

# Linux architecture directories
export LINUX_LOCAL_DIR="$SRC_DIR/linux-6.1"
export LINUX_ARCH_ARM64="$SRC_DIR/linux_arch_arm64/arch"

export UBOOT_SRC_DIR="$SRC_DIR/u-boot-2026.01-rc5"

# 板卡特定参数
export KERNEL_ARCH=arm64
export UBOOT_ARCH=arm64
export QEMU_MACHINE=virt
export QEMU_CPU=cortex-a57
export QEMU_SMP=4
export QEMU_MEM=1024
export KERNEL_CMDLINE="console=ttyAMA0 root=/dev/ram0 rw init=/linuxrc nokaslr earlycon=pl011,0x9000000 debug loglevel=8"

# BOARD_DIR 目录
export BOARD_DIR="$PROJECT_ROOT/board/$BOARD_NAME"
export HOOKS_DIR="$BOARD_DIR/hooks"
export BOARD_PRE_BUILD_HOOK="$HOOKS_DIR/pre_build.sh"
export BOARD_POST_BUILD_HOOK="$HOOKS_DIR/post_build.sh"
export BOARD_PRE_IMAGE_HOOK="$HOOKS_DIR/pre_image.sh"
export BOARD_POST_IMAGE_HOOK="$HOOKS_DIR/post_image.sh"
export BOARD_FAKEROOT_HOOK="$HOOKS_DIR/fakeroot.sh"

# 输出目录
export BOARD_OUT_DIR="$OUT_DIR/$BOARD_NAME"
# BR2_EXTERNAL 目录
export BR2_EXTERNAL_DIR="$PROJECT_ROOT/board/$BOARD_NAME/br2_external"

# Common utility functions
export -f log_info || log_info() { echo "[INFO] $@"; }
export -f log_warn || log_warn() { echo "[WARN] $@" >&2; }
export -f log_error || log_error() { echo "[ERROR] $@" >&2; }
